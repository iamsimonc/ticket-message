<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Verse - 4s Reading Flow</title>
    <style>
        :root {
            --teal-color: #4FD1C5;
            --fade-speed: 2s; /* 調慢淡入本身的過渡速度，更有呼吸感 */
        }

        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: linear-gradient(145deg, #1e1e1e, #161616);
            width: 90%;
            max-width: 360px;
            min-height: 65vh;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        /* SVG 高清向量漣漪 */
        .ripple-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .ripple-circle {
            fill: var(--teal-color);
            fill-opacity: 0.12;
            transform-origin: center;
            animation: ripple-hd-slow 8s linear forwards; /* 漣漪也同步拉長到 8 秒 */
        }

        @keyframes ripple-hd-slow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(250); opacity: 0; }
        }

        /* 文字淡入動畫 */
        .fade-in-node {
            opacity: 0;
            transition: opacity var(--fade-speed) ease-in-out;
        }

        .fade-in-node.visible {
            opacity: 1;
        }

        .words {
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--teal-color);
            font-style: italic;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 300;
        }

        .divider { width: 40px; height: 2px; background: #333; margin: 0 auto 2rem; }
        .section { margin-bottom: 1.8rem; text-align: center; }
        .verse-en { font-size: 0.95rem; color: #a0a0a0; line-height: 1.6; margin-bottom: 0.5rem; }
        .ref-en { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .verse-ch { font-size: 1.2rem; color: #ffffff; line-height: 1.7; margin-bottom: 0.6rem; }
        .ref-ch { font-size: 0.85rem; color: #666; }
        .footer-hint { position: absolute; bottom: 30px; width: 100%; font-size: 0.65rem; color: #222; letter-spacing: 4px; text-align: center; }

        /* 啟動頁面 */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f0f0f;
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
            transition: opacity 1.5s ease;
        }
        .splash-ripple {
            position: absolute;
            border: 1.5px solid var(--teal-color);
            border-radius: 50%;
            animation: splash-wave 5s infinite linear;
            opacity: 0;
        }
        .splash-ripple:nth-child(n) { animation-delay: calc(var(--i) * 0.6s); }
        @keyframes splash-wave {
            0% { width: 0; height: 0; opacity: 0; border-width: 2px; }
            10% { opacity: 0.3; }
            100% { width: 300px; height: 300px; opacity: 0; border-width: 0.5px; }
        }
    </style>
</head>
<body onclick="handleAction(event)">

<audio id="bgMusic" loop playsinline>
    <source src="rememberme.mp3" type="audio/mpeg">
</audio>

<div id="splash-screen">
    <div class="splash-ripple" style="--i:0"></div>
    <div class="splash-ripple" style="--i:1"></div>
    <div class="splash-ripple" style="--i:2"></div>
    <div class="splash-ripple" style="--i:3"></div>
    <div class="splash-ripple" style="--i:4"></div>
    <div class="splash-ripple" style="--i:5"></div>
</div>

<div class="card" id="card">
    <svg class="ripple-svg" id="ripple-container"></svg>

    <div id="words" class="words fade-in-node">...</div>
    <div id="div-line" class="divider fade-in-node"></div>
    <div id="en-verse-node" class="verse-en fade-in-node"></div>
    <div id="en-ref-node" class="ref-en fade-in-node" style="margin-bottom: 1.8rem;"></div>

    <div id="ch-section" class="section fade-in-node">
        <div id="verse-ch" class="verse-ch"></div>
        <div id="ref-ch" class="ref-ch"></div>
    </div>

    <div class="footer-hint">TAP</div>
</div>

<script>
    let dataList = [];
    let isStarted = false;

    async function init() {
        try {
            const resp = await fetch('data.txt?t=' + Date.now());
            dataList = await resp.json();
            prepareAndShowContent();
        } catch (e) { console.error("Data error"); }
    }

    function prepareAndShowContent() {
        if (!dataList.length) return;
        
        const item = dataList[Math.floor(Math.random() * dataList.length)];
        const nodes = document.querySelectorAll('.fade-in-node');

        nodes.forEach(el => {
            el.style.transition = 'none';
            el.classList.remove('visible');
        });

        document.getElementById('words').innerText = item.words;
        document.getElementById('en-verse-node').innerText = item.en_verse;
        document.getElementById('en-ref-node').innerText = item.en_ref;
        document.getElementById('verse-ch').innerText = item.ch_verse;
        document.getElementById('ref-ch').innerText = item.ch_ref;

        void document.body.offsetHeight;

        nodes.forEach(el => {
            el.style.transition = ''; 
        });

        startFadeSequence();
    }

    // 更新：每一句之間有足夠的閱讀時間 (總長約 4-5 秒)
    function startFadeSequence() {
        const sequence = [
            { id: 'words', delay: 0 },         // 立即顯示小語
            { id: 'div-line', delay: 1200 },    // 1.2s 出分隔線
            { id: 'en-verse-node', delay: 2400 },// 2.4s 出英文經文
            { id: 'en-ref-node', delay: 3600 },  // 3.6s 出英文章節
            { id: 'ch-section', delay: 4800 }   // 4.8s 出中文完整區塊
        ];

        sequence.forEach(item => {
            setTimeout(() => {
                const el = document.getElementById(item.id);
                if (el) el.classList.add('visible');
            }, item.delay);
        });
    }

    function handleAction(event) {
        if (!isStarted) {
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Music play blocked"));
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1500);
            isStarted = true;
            createSvgRipple(event);
            prepareAndShowContent();
        } else {
            createSvgRipple(event);
            prepareAndShowContent();
        }
    }

    function createSvgRipple(event) {
        const svg = document.getElementById('ripple-container');
        const card = document.getElementById('card');
        const rect = card.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", 2);
        circle.setAttribute("class", "ripple-circle");

        svg.appendChild(circle);
        setTimeout(() => { circle.remove(); }, 8000); // 配合 8s 動畫
    }

    init();
</script>
</body>
</html>
