<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Verse - Ultra Slow Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .card {
            background: linear-gradient(145deg, #1e1e1e, #161616);
            width: 100%;
            max-width: 360px;
            min-height: 65vh;
            padding: 45px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            z-index: 1;
        }

        /* === 漣漪：強制 10% 均速、極致巨大 === */
        .ripple {
            position: absolute;
            background: rgba(79, 209, 197, 0.2); 
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            /* 改為 linear 確保均速，時間拉長到 6 秒 */
            animation: ripple-ultra-slow 6s linear forwards; 
            pointer-events: none;
            left: var(--x);
            top: var(--y);
        }

        @keyframes ripple-ultra-slow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(20); opacity: 0; }
        }

        /* === 啟動頁面 === */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f0f0f;
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1.5s ease;
        }

        .splash-ripple-circle {
            position: absolute;
            width: 2px; height: 2px;
            background-color: #4FD1C5;
            border-radius: 50%;
            opacity: 0;
            /* 啟動漣漪也同步放慢 */
            animation: splash-slow 5s infinite linear;
        }

        .splash-ripple-circle:nth-child(1) { animation-delay: 0s; }
        .splash-ripple-circle:nth-child(2) { animation-delay: 1s; }
        .splash-ripple-circle:nth-child(3) { animation-delay: 2s; }
        .splash-ripple-circle:nth-child(4) { animation-delay: 3s; }
        .splash-ripple-circle:nth-child(5) { animation-delay: 4s; }

        @keyframes splash-slow {
            0% { transform: scale(0); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: scale(100); opacity: 0; }
        }

        .words { font-size: 1.35rem; line-height: 1.5; color: #4FD1C5; font-style: italic; margin-bottom: 2rem; font-weight: 300; text-align: center; }
        .divider { width: 40px; height: 2px; background: #333; margin: 0 auto 2rem; }
        .section { margin-bottom: 1.8rem; text-align: center; }
        .verse-en { font-size: 0.95rem; color: #a0a0a0; line-height: 1.6; margin-bottom: 0.5rem; }
        .ref-en { font-size: 0.75rem; color: #666; letter-spacing: 0.05rem; text-transform: uppercase; }
        .verse-ch { font-size: 1.2rem; color: #ffffff; line-height: 1.7; margin-bottom: 0.6rem; }
        .ref-ch { font-size: 0.85rem; color: #666; }
        .footer-hint { position: absolute; bottom: 25px; width: 100%; font-size: 0.65rem; color: #444; letter-spacing: 3px; text-align: center; }
    </style>
</head>
<body>

<audio id="bgMusic" loop playsinline>
    <source src="rememberme.mp3" type="audio/mpeg">
</audio>

<div id="splash-screen" onclick="startApp(event)">
    <div class="splash-ripple-circle"></div>
    <div class="splash-ripple-circle"></div>
    <div class="splash-ripple-circle)</div>
    <div class="splash-ripple-circle"></div>
    <div class="splash-ripple-circle"></div>
</div>

<div class="card" id="card" onclick="handleCardClick(event)">
    <div id="words" class="words">...</div>
    <div class="divider"></div>
    <div class="section"><div id="verse-en" class="verse-en"></div><div id="ref-en" class="ref-en"></div></div>
    <div class="section"><div id="verse-ch" class="verse-ch"></div><div id="ref-ch" class="ref-ch"></div></div>
    <div class="footer-hint">TAP</div>
</div>

<script>
    let dataList = [];
    let isMusicPlaying = false;

    async function init() {
        try {
            const resp = await fetch('data.txt?t=' + Date.now());
            dataList = await resp.json();
            displayRandom();
        } catch (e) { console.error(e); }
    }

    function displayRandom() {
        if (!dataList.length) return;
        const item = dataList[Math.floor(Math.random() * dataList.length)];
        document.getElementById('words').innerText = item.words;
        document.getElementById('verse-en').innerText = item.en_verse;
        document.getElementById('ref-en').innerText = item.en_ref;
        document.getElementById('verse-ch').innerText = item.ch_verse;
        document.getElementById('ref-ch').innerText = item.ch_ref;
    }

    function startApp(event) {
        if (!isMusicPlaying) {
            document.getElementById('bgMusic').play();
            isMusicPlaying = true;
        }
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1500);
        handleCardClick(event);
    }

    function handleCardClick(event) {
        createRipple(event);
        displayRandom();
    }

    function createRipple(event) {
        const card = document.getElementById('card');
        const ripple = document.createElement('span');
        const rect = card.getBoundingClientRect();
        
        // 精確計算點擊位置
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        
        ripple.style.setProperty('--x', `${x}px`);
        ripple.style.setProperty('--y', `${y}px`);
        ripple.style.width = '20px';
        ripple.style.height = '20px';
        ripple.classList.add('ripple');
        
        card.appendChild(ripple);
        // 清除時間同步延長至 6 秒
        setTimeout(() => { ripple.remove(); }, 6000);
    }

    init();
</script>
</body>
</html>
