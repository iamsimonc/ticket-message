<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Verse - Teal Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="每日金句">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3004/3004613.png">
    <style>
        /* 基礎深色設定 */
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* 針對 9:16 優化的卡片 */
        .card {
            background: linear-gradient(145deg, #1e1e1e, #161616);
            width: 100%;
            max-width: 360px;
            min-height: 65vh;
            padding: 45px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            z-index: 1;
        }

        /* === 漣漪效果：慢速、巨大、湖水色 === */
        .ripple {
            position: absolute;
            background: rgba(79, 209, 197, 0.15); /* 湖水色淡化 */
            border-radius: 50%;
            transform: scale(0);
            /* 速度再慢 50%：1.4s -> 2.1s */
            animation: ripple-animation 2.1s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                /* Size 再大 100%：scale(8) -> scale(16) */
                transform: scale(16);
                opacity: 0;
            }
        }

        /* === 啟動頁面：加密漣漪 === */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1.2s ease, visibility 1.2s ease;
        }

        .splash-ripple-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .splash-ripple-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background-color: #4FD1C5; /* 湖水色 */
            border-radius: 50%;
            opacity: 0;
            /* 動畫週期稍微拉長以配合視覺 */
            animation: splash-ripple-loop 3s infinite cubic-bezier(0.2, 0, 0.4, 1);
        }

        /* 增加到 5 個圓圈讓漣漪更「密」 */
        .splash-ripple-circle:nth-child(1) { animation-delay: 0s; }
        .splash-ripple-circle:nth-child(2) { animation-delay: 0.6s; }
        .splash-ripple-circle:nth-child(3) { animation-delay: 1.2s; }
        .splash-ripple-circle:nth-child(4) { animation-delay: 1.8s; }
        .splash-ripple-circle:nth-child(5) { animation-delay: 2.4s; }

        @keyframes splash-ripple-loop {
            0% { width: 0px; height: 0px; opacity: 0; }
            5% { opacity: 0.4; }
            100% { width: 150px; height: 150px; opacity: 0; }
        }

        /* === 卡片排版 === */
        .words {
            font-size: 1.35rem;
            line-height: 1.5;
            color: #4FD1C5; /* 小語也改為湖水色 */
            font-style: italic;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #333;
            margin: 0 auto 2rem;
        }

        .section { margin-bottom: 1.8rem; }
        .verse-en { font-size: 0.95rem; color: #a0a0a0; line-height: 1.6; margin-bottom: 0.5rem; }
        .ref-en { font-size: 0.75rem; color: #666; letter-spacing: 0.05rem; text-transform: uppercase; }
        .verse-ch { font-size: 1.2rem; color: #ffffff; line-height: 1.7; margin-bottom: 0.6rem; letter-spacing: 0.02rem; }
        .ref-ch { font-size: 0.85rem; color: #666; }
        .footer-hint {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            font-size: 0.65rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop playsinline>
    <source src="rememberme.mp3" type="audio/mpeg">
</audio>

<div id="splash-screen" onclick="startApp(event)">
    <div class="splash-ripple-container">
        <div class="splash-ripple-circle"></div>
        <div class="splash-ripple-circle"></div>
        <div class="splash-ripple-circle"></div>
        <div class="splash-ripple-circle"></div>
        <div class="splash-ripple-circle"></div>
    </div>
</div>

<div class="card" id="card" onclick="handleCardClick(event)">
    <div id="words" class="words">...</div>
    <div class="divider"></div>
    
    <div class="section">
        <div id="verse-en" class="verse-en"></div>
        <div id="ref-en" class="ref-en"></div>
    </div>

    <div class="section">
        <div id="verse-ch" class="verse-ch"></div>
        <div id="ref-ch" class="ref-ch"></div>
    </div>

    <div class="footer-hint">Tap</div>
</div>

<script>
    let dataList = [];
    let isMusicPlaying = false;

    async function init() {
        try {
            const resp = await fetch('data.txt?t=' + Date.now());
            dataList = await resp.json();
            displayRandom();
        } catch (e) {
            document.getElementById('words').innerText = "Loading data...";
        }
    }

    function displayRandom() {
        if (!dataList.length) return;
        const item = dataList[Math.floor(Math.random() * dataList.length)];
        document.getElementById('words').innerText = item.words;
        document.getElementById('verse-en').innerText = item.en_verse;
        document.getElementById('ref-en').innerText = item.en_ref;
        document.getElementById('verse-ch').innerText = item.ch_verse;
        document.getElementById('ref-ch').innerText = item.ch_ref;
    }

    function startApp(event) {
        if (!isMusicPlaying) {
            const music = document.getElementById('bgMusic');
            music.play().then(() => { isMusicPlaying = true; }).catch(e => console.log(e));
        }

        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        splash.style.visibility = 'hidden';

        setTimeout(() => {
            const card = document.getElementById('card');
            const rect = card.getBoundingClientRect();
            const fakeEvent = {
                clientX: rect.left + rect.width / 2,
                clientY: rect.top + rect.height / 2
            };
            createRipple(fakeEvent);
        }, 300);
    }

    function handleCardClick(event) {
        createRipple(event);
        displayRandom();
    }

    function createRipple(event) {
        const card = document.getElementById('card');
        const ripple = document.createElement('span');
        const rect = card.getBoundingClientRect();
        
        const size = Math.max(rect.width, rect.height);
        const x = event.clientX - rect.left - size / 2;
        const y = event.clientY - rect.top - size / 2;
        
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        ripple.classList.add('ripple');
        
        card.appendChild(ripple);
        // 清除時間同步增加到 2100ms
        setTimeout(() => { ripple.remove(); }, 2100);
    }

    init();
</script>

</body>
</html>
