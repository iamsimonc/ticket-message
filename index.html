<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日經文 App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
        .quote { font-style: italic; color: #555; margin-bottom: 10px; font-size: 1.1em; }
        .scripture { font-weight: bold; color: #333; font-size: 1.2em; margin-bottom: 5px; }
        .ref { color: #888; font-size: 0.9em; }
        button { margin-top: 20px; padding: 10px 20px; border: none; background: #5a67d8; color: white; border-radius: 5px; cursor: pointer; }
        button:hover { background: #434190; }
    </style>
</head>
<body>

<div class="card">
    <div id="quote" class="quote">載入中...</div>
    <div id="scripture" class="scripture"></div>
    <div id="ref" class="ref"></div>
    <button onclick="getRandomVerse()">下一句</button>
</div>

<script>
    let bibleData = [];

    // 1. 從 txt 檔抓取資料
    async function loadData() {
        try {
            const response = await fetch('data.txt');
            bibleData = await response.json();
            getRandomVerse(); // 初始載入第一句
        } catch (error) {
            document.getElementById('quote').innerText = "讀取失敗，請確認 data.txt 是否在同一資料夾且編碼為 UTF-8";
            console.error(error);
        }
    }

    // 2. 隨機抽選顯示
    function getRandomVerse() {
        if (bibleData.length === 0) return;
        const randomIndex = Math.floor(Math.random() * bibleData.length);
        const verse = bibleData[randomIndex];
        
        document.getElementById('quote').innerText = verse.en;
        document.getElementById('scripture').innerText = verse.ch;
        document.getElementById('ref').innerText = verse.ref;
    }

    // 啟動
    loadData();
</script>

</body>
</html>
