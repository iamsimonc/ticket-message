<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心靈金句 App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; max-width: 500px; width: 100%; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .words { font-size: 1.4em; color: #4a5568; font-style: italic; margin-bottom: 30px; line-height: 1.4; border-bottom: 1px solid #edf2f7; padding-bottom: 20px; }
        .bible-section { color: #2d3748; }
        .verse-ch { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .verse-en { font-size: 1em; color: #718096; margin-bottom: 15px; }
        .ref { font-size: 0.85em; color: #a0aec0; letter-spacing: 1px; text-transform: uppercase; }
        button { margin-top: 30px; padding: 12px 30px; border: none; background: #667eea; color: white; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #5a67d8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <div id="words" class="words">載入中...</div>
    <div class="bible-section">
        <div id="verse-ch" class="verse-ch"></div>
        <div id="verse-en" class="verse-en"></div>
        <div id="ref" class="ref"></div>
    </div>
    <button onclick="displayRandom()">下一句</button>
</div>

<script>
    let dataList = [];

// 將原本的 fetch('data.txt') 改成這樣：
async function init() {
    try {
        // 加上 ?v= + 時間，讓瀏覽器以為這是新檔案，避開快取
        const resp = await fetch('data.txt?v=' + new Date().getTime());
        dataList = await resp.json();
        displayRandom();
    } catch (e) {
        document.getElementById('words').innerText = "讀取失敗：" + e;
    }
}

function displayRandom() {
        if (!dataList.length) return;
        const item = dataList[Math.floor(Math.random() * dataList.length)];
        
        // 這裡的名稱必須和上面 JSON 裡的一模一樣
        document.getElementById('words').innerText = item.words;
        document.getElementById('verse-ch').innerText = item.ch_verse;
        document.getElementById('verse-en').innerText = item.en_verse;
        document.getElementById('ref').innerText = `${item.ch_ref} | ${item.en_ref}`;
    }

    init();
</script>

</body>
</html>
