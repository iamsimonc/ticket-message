<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      text-align: center;
      padding: 32px;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Helvetica Neue", Arial, sans-serif;
    }

    .message {
      font-size: clamp(36px, 6.5vw, 54px);
      line-height: 1.45;
      letter-spacing: 0.6px;
      font-weight: 500;
      max-width: 680px;

      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="message" id="message"></div>

<script>
  const messages = [
    "Trust your pace.",
    "Small steps still count.",
    "Every journey begins with one brave step.",
    "Not just a trip — a life in progress.",
    "One ticket. Endless possibilities.",
    "Adventure is calling.",
    "Final call for bravery / love."
  ];

  document.getElementById("message").innerText =
    messages[Math.floor(Math.random() * messages.length)];
</script>

</body>
</html>
