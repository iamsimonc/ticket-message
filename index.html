<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HK9600 transfer flight</title>
    <style>
        :root {
            --teal-color: #4FD1C5;
            --fade-speed: 2s; 
        }

        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: linear-gradient(145deg, #1e1e1e, #161616);
            width: 90%;
            max-width: 360px;
            min-height: 60vh;
            /* 頂部 padding 設為 80px，將內容往上推 */
            padding: 80px 30px 50px 30px; 
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .ripple-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .ripple-circle {
            fill: var(--teal-color);
            fill-opacity: 0.12;
            transform-origin: center;
            animation: ripple-hd-slow 10s linear forwards; 
        }
        @keyframes ripple-hd-slow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(250); opacity: 0; }
        }

        .fade-in-node {
            opacity: 0;
            transition: opacity var(--fade-speed) ease-in-out;
        }
        .fade-in-node.visible { opacity: 1; }

        .verse-en { 
            font-size: 1.25rem; 
            color: var(--teal-color); 
            line-height: 1.5; 
            margin-bottom: 0.8rem; 
            text-align: center;
            font-weight: 300;
            font-style: italic;
        }
        .ref-en { 
            font-size: 0.75rem; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-align: center;
            margin-bottom: 4rem; /* 加大間距，讓排版不擁擠 */
        }
        .section-ch { text-align: center; }
        .verse-ch { 
            font-size: 1.1rem; 
            color: #ffffff; 
            line-height: 1.8; 
            margin-bottom: 0.6rem; 
            letter-spacing: 0.05rem;
        }
        .ref-ch { font-size: 0.8rem; color: #555; }

        .footer-hint { 
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            left: 0;
            font-size: 0.65rem; 
            color: #333; 
            text-transform: uppercase;
            letter-spacing: 4px; 
            text-align: center; 
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f0f0f;
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
            transition: opacity 1.5s ease;
        }
        .splash-ripple {
            position: absolute;
            border: 1.5px solid var(--teal-color);
            border-radius: 50%;
            animation: splash-wave 6s infinite linear;
            opacity: 0;
        }
        .splash-ripple:nth-child(1) { animation-delay: 0s; }
        .splash-ripple:nth-child(2) { animation-delay: 2s; }
        .splash-ripple:nth-child(3) { animation-delay: 4s; }

        @keyframes splash-wave {
            0% { width: 0; height: 0; opacity: 0; border-width: 2px; }
            10% { opacity: 0.3; }
            100% { width: 350px; height: 350px; opacity: 0; border-width: 0.5px; }
        }
    </style>
</head>
<body onclick="handleAction(event)">

<audio id="bgMusic" loop playsinline>
    <source src="rememberme.mp3" type="audio/mpeg">
</audio>

<div id="splash-screen">
    <div class="splash-ripple"></div>
    <div class="splash-ripple"></div>
    <div class="splash-ripple"></div>
</div>

<div class="card" id="card">
    <svg class="ripple-svg" id="ripple-container"></svg>

    <div id="content-all" class="fade-in-node">
        <div id="en-verse" class="verse-en"></div>
        <div id="en-ref" class="ref-en"></div>
        <div class="section-ch">
            <div id="verse-ch" class="verse-ch"></div>
            <div id="ref-ch" class="ref-ch"></div>
        </div>
    </div>

    <div class="footer-hint">TAP</div>
</div>

<script>
    let dataList = [];
    let isStarted = false;

    async function init() {
        try {
            const resp = await fetch('data.txt?t=' + Date.now());
            dataList = await resp.json();
            prepareAndShowContent();
        } catch (e) { console.error("Data error"); }
    }

    function prepareAndShowContent() {
        if (!dataList.length) return;
        const item = dataList[Math.floor(Math.random() * dataList.length)];
        const contentBlock = document.getElementById('content-all');

        contentBlock.style.transition = 'none';
        contentBlock.classList.remove('visible');

        document.getElementById('en-verse').innerText = item.en_verse;
        document.getElementById('en-ref').innerText = item.en_ref;
        document.getElementById('verse-ch').innerText = item.ch_verse;
        document.getElementById('ref-ch').innerText = item.ch_ref;

        void document.body.offsetHeight;

        contentBlock.style.transition = '';
        contentBlock.classList.add('visible');
    }

    function handleAction(event) {
        if (!isStarted) {
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log(e));
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1500);
            isStarted = true;
            createSvgRipple(event);
            prepareAndShowContent();
        } else {
            createSvgRipple(event);
            prepareAndShowContent();
        }
    }

    function createSvgRipple(event) {
        const svg = document.getElementById('ripple-container');
        const card = document.getElementById('card');
        const rect = card.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", 2);
        circle.setAttribute("class", "ripple-circle");

        svg.appendChild(circle);
        setTimeout(() => { circle.remove(); }, 10000); 
    }

    init();
</script>
</body>
</html>
